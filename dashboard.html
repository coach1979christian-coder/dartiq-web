<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTIQ Dashboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cyan:#22D9FF;--bg:#020713;--text:#EAF8FF;--muted:#8CB7D6}
html,body{
  width:100%;
  margin:0;
  padding:0;
  overflow-x:hidden;
  background:transparent !important;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
}
body{padding:10px}

.dashboard{
  width:100%;
  border-radius:26px;
  padding:16px;
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 0%, rgba(34,217,255,.22), transparent 34%),
    radial-gradient(circle at 95% 10%, rgba(0,174,239,.16), transparent 35%),
    linear-gradient(180deg,#071d33,#020914);
  border:1px solid rgba(34,217,255,.48);
  box-shadow:0 0 26px rgba(34,217,255,.28), inset 0 0 22px rgba(34,217,255,.08);
}

.header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
.kicker{color:var(--cyan);font-size:11px;font-weight:900;letter-spacing:2px}
.title{color:white;font-size:30px;line-height:1;font-weight:900;text-shadow:0 0 18px rgba(34,217,255,.6);margin-top:5px}
.live{color:var(--cyan);font-size:12px;font-weight:900;padding:8px 10px;border-radius:999px;border:1px solid rgba(34,217,255,.45);background:rgba(34,217,255,.10);box-shadow:0 0 16px rgba(34,217,255,.24)}
.line{height:3px;border-radius:99px;background:linear-gradient(90deg,var(--cyan),rgba(34,217,255,.05));box-shadow:0 0 16px rgba(34,217,255,.85);margin-bottom:14px}

.score-card{
  text-align:center;
  padding:18px 12px;
  border-radius:22px;
  margin-bottom:12px;
  background:radial-gradient(circle at center,rgba(34,217,255,.22),rgba(7,20,37,.92) 62%);
  border:1px solid rgba(34,217,255,.42);
  box-shadow:0 0 25px rgba(34,217,255,.25), inset 0 0 24px rgba(34,217,255,.10);
}
.score-label{color:var(--muted);font-size:12px;font-weight:900;letter-spacing:2px}
.score{font-size:62px;line-height:.95;font-weight:900;color:white;margin-top:7px;text-shadow:0 0 12px rgba(255,255,255,.4),0 0 32px rgba(34,217,255,.85)}
.grade{display:inline-block;margin-top:10px;padding:7px 14px;border-radius:999px;background:linear-gradient(90deg,#22D9FF,#A9F3FF);color:#02101D;font-weight:900;font-size:15px;box-shadow:0 0 18px rgba(34,217,255,.55)}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{min-width:0;padding:12px 10px;border-radius:16px;background:linear-gradient(180deg,rgba(13,42,72,.90),rgba(7,24,44,.95));border:1px solid rgba(34,217,255,.28);box-shadow:inset 0 0 16px rgba(34,217,255,.06)}
.stat-label{color:var(--muted);font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.stat-value{color:var(--cyan);font-size:20px;font-weight:900;line-height:1.1;text-shadow:0 0 12px rgba(34,217,255,.55);overflow-wrap:anywhere;word-break:break-word}

.card{margin-top:10px;padding:14px;border-radius:18px;background:linear-gradient(180deg,rgba(9,32,58,.92),rgba(5,17,32,.96));border:1px solid rgba(34,217,255,.32);box-shadow:0 0 18px rgba(34,217,255,.12)}
.card-title{font-size:14px;color:white;font-weight:900;margin-bottom:7px}
.card-text{font-size:14px;line-height:1.42;color:#D8F3FF;overflow-wrap:anywhere}
.footer{text-align:center;font-size:11px;color:var(--cyan);margin-top:14px;letter-spacing:1px;font-weight:900;text-shadow:0 0 12px rgba(34,217,255,.65)}

@media(max-width:360px){
  body{padding:8px}
  .dashboard{padding:14px}
  .title{font-size:26px}
  .score{font-size:54px}
  .stat-value{font-size:18px}
}
</style>
</head>

<body>
<div class="dashboard">
  <div class="header">
    <div>
      <div class="kicker">DARTIQ AI</div>
      <div class="title">Dashboard</div>
    </div>
    <div class="live">LIVE</div>
  </div>

  <div class="line"></div>

  <div class="score-card">
    <div class="score-label">AI COACH SCORE</div>
    <div class="score" id="score">-</div>
    <div class="grade" id="grade">-</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Best Average</div><div class="stat-value" id="bestavg">-</div></div>
    <div class="stat"><div class="stat-label">Total Sessions</div><div class="stat-value" id="sessions">-</div></div>
    <div class="stat"><div class="stat-label">Highest Checkout</div><div class="stat-value" id="highcheckout">-</div></div>
    <div class="stat"><div class="stat-label">First 9 Avg</div><div class="stat-value" id="first9">-</div></div>
    <div class="stat"><div class="stat-label">Checkout %</div><div class="stat-value" id="checkoutpct">-</div></div>
    <div class="stat"><div class="stat-label">Total 180s</div><div class="stat-value" id="total180">-</div></div>
  </div>

  <div class="card"><div class="card-title">🤖 AI Insight</div><div class="card-text" id="insight">-</div></div>
  <div class="card"><div class="card-title">🎯 Next Goal</div><div class="card-text" id="goal">-</div></div>
  <div class="card"><div class="card-title">⚡ Focus This Week</div><div class="card-text" id="focus">-</div></div>
  <div class="footer">POWERED BY DARTIQ AI</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
function clean(value){ if(!value) return "-"; return decodeURIComponent(value).replace(/[{}]/g,""); }
["score","grade","bestavg","sessions","highcheckout","first9","checkoutpct","total180","insight","goal","focus"].forEach(function(key){
  const el = document.getElementById(key);
  if(el) el.textContent = clean(params.get(key));
});
</script>
</body>
</html>
