<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTIQ Player Profile</title>
<style>
:root{--bg:#000;--panel:#0f0f0f;--panel2:#171717;--line:#2a2a2a;--text:#fff;--muted:#a7a7a7}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:var(--bg)}
body{font-family:Inter,Arial,Helvetica,sans-serif;color:var(--text);padding:12px}
.shell{width:100%;max-width:430px;margin:0 auto;background:linear-gradient(180deg,#121212,#070707);border:1px solid var(--line);border-radius:28px;padding:18px;box-shadow:0 0 28px rgba(255,255,255,.07)}
.brand{text-align:center;font-size:11px;font-weight:900;letter-spacing:2.4px;color:#d8d8d8;margin-bottom:14px}
.profile{display:flex;flex-direction:column;align-items:center;text-align:center}
.photo{width:104px;height:104px;border-radius:50%;object-fit:cover;border:3px solid #fff;background:#151515;box-shadow:0 0 18px rgba(255,255,255,.18)}
.name{margin-top:12px;font-size:24px;font-weight:900;line-height:1.1}
.email{margin-top:5px;font-size:12px;color:var(--muted);word-break:break-word}
.score-card{margin-top:18px;border:1px solid var(--line);border-radius:20px;padding:18px;text-align:center;background:linear-gradient(180deg,#1a1a1a,#101010)}
.label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:800}
.score{margin-top:5px;font-size:56px;line-height:1;font-weight:950}
.stats{margin-top:14px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.stat{min-width:0;border:1px solid var(--line);border-radius:16px;padding:13px 10px;background:var(--panel2);text-align:center}
.value{margin-top:5px;font-size:22px;line-height:1.1;font-weight:900;overflow-wrap:anywhere}
.section{margin-top:12px;border:1px solid var(--line);border-radius:16px;padding:14px;background:var(--panel)}
.section-title{font-size:12px;font-weight:900;margin-bottom:7px}
.section-text{color:#eee;font-size:13px;line-height:1.45;overflow-wrap:anywhere}
.footer{text-align:center;margin-top:16px;color:#777;font-size:10px;font-weight:800;letter-spacing:1.2px}
@media(min-width:700px){.shell{max-width:700px}.stats{grid-template-columns:repeat(5,minmax(0,1fr))}}
</style>
</head>
<body>
<main class="shell">
  <div class="brand">DARTIQ AI PLAYER PROFILE</div>
  <section class="profile">
    <img class="photo" id="photo" src="https://placehold.co/220x220/151515/ffffff?text=DQ" alt="Player profile photo">
    <div class="name" id="name">Player</div>
    <div class="email" id="email">player@email.com</div>
  </section>
  <section class="score-card">
    <div class="label">AI Coach Score</div>
    <div class="score" id="aiscore">0</div>
  </section>
  <section class="stats">
    <div class="stat"><div class="label">Sessions</div><div class="value" id="sessions">0</div></div>
    <div class="stat"><div class="label">Current Avg</div><div class="value" id="currentavg">0</div></div>
    <div class="stat"><div class="label">Best Avg</div><div class="value" id="bestavg">0</div></div>
    <div class="stat"><div class="label">Best Checkout</div><div class="value" id="checkout">0</div></div>
    <div class="stat"><div class="label">Checkout %</div><div class="value" id="checkoutpct">0%</div></div>
  </section>
  <section class="section">
    <div class="section-title">🎯 MAIN GOAL</div>
    <div class="section-text" id="goal">No goal set.</div>
  </section>
  <section class="section">
    <div class="section-title">⚠️ MAIN ISSUE</div>
    <div class="section-text" id="weakness">No issue detected.</div>
  </section>
  <div class="footer">POWERED BY DARTIQ AI</div>
</main>
<script>
(function(){
  const params=new URLSearchParams(window.location.search);
  function getValue(key,fallback){
    const value=params.get(key);
    if(value===null||value.trim()==="") return fallback;
    try{return decodeURIComponent(value.replace(/\+/g," ")).trim()||fallback}
    catch(error){return value.trim()||fallback}
  }
  const fields={name:"Player",email:"player@email.com",aiscore:"0",sessions:"0",currentavg:"0",bestavg:"0",checkout:"0",checkoutpct:"0%",goal:"No goal set.",weakness:"No issue detected."};
  Object.keys(fields).forEach(function(id){
    const element=document.getElementById(id);
    if(element) element.textContent=getValue(id,fields[id]);
  });
  const checkoutPct=document.getElementById("checkoutpct");
  if(checkoutPct&&checkoutPct.textContent!=="--") checkoutPct.textContent=checkoutPct.textContent.replace(/%$/ ,"")+"%";
  const photo=getValue("photo","");
  if(photo) document.getElementById("photo").src=photo;
})();
</script>
</body>
</html>
