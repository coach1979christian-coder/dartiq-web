<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTIQ Player Profile</title>

<style>
:root{
  --bg:#000;
  --panel:#111;
  --panel2:#181818;
  --line:#2b2b2b;
  --text:#fff;
  --muted:#999;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,
body{
  width:100%;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}

body{
  display:flex;
  justify-content:center;
  padding:6px;
}

.profile-card{
  width:100%;
  max-width:430px;
  background:linear-gradient(180deg,#141414,#050505);
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
}

.brand{
  text-align:center;
  font-size:8px;
  font-weight:900;
  letter-spacing:2px;
  color:#ccc;
  margin-bottom:8px;
}

.profile-head{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
}

.photo{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #fff;
  background:#222;
  flex-shrink:0;
}

.player-info{
  min-width:0;
}

.name{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
  overflow-wrap:anywhere;
}

.email{
  margin-top:4px;
  font-size:10px;
  color:var(--muted);
  overflow-wrap:anywhere;
}

.score-card{
  margin-top:8px;
  padding:12px;
  text-align:center;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--panel2);
}

.label{
  font-size:8px;
  font-weight:800;
  letter-spacing:.8px;
  text-transform:uppercase;
  color:var(--muted);
}

.score{
  margin-top:3px;
  font-size:42px;
  line-height:1;
  font-weight:950;
}

.stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:7px;
  margin-top:8px;
}

.stat{
  min-width:0;
  padding:9px 7px;
  text-align:center;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--panel);
}

.stat-value{
  margin-top:4px;
  font-size:18px;
  font-weight:900;
  overflow-wrap:anywhere;
}

.stat:last-child{
  grid-column:1 / -1;
}

.info{
  margin-top:8px;
  padding:10px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--panel);
}

.info-title{
  margin-bottom:4px;
  font-size:10px;
  font-weight:900;
}

.info-text{
  font-size:11px;
  line-height:1.3;
  color:#eee;
  overflow-wrap:anywhere;
}

.footer{
  margin-top:10px;
  text-align:center;
  font-size:7px;
  font-weight:800;
  letter-spacing:1px;
  color:#666;
}

@media(min-width:600px){
  .profile-card{
    max-width:600px;
  }

  .stats{
    grid-template-columns:repeat(5,minmax(0,1fr));
  }

  .stat:last-child{
    grid-column:auto;
  }
}
</style>
</head>

<body>

<main class="profile-card">

  <div class="brand">
    DARTIQ AI PLAYER PROFILE
  </div>

  <section class="profile-head">

    <img
      class="photo"
      id="photo"
      src="https://placehold.co/200x200/181818/ffffff?text=DQ"
      alt="Player profile photo"
    >

    <div class="player-info">

      <div class="name" id="name">
        Player
      </div>

      <div class="email" id="email">
        player@email.com
      </div>

    </div>

  </section>

  <section class="score-card">

    <div class="label">
      AI Coach Score
    </div>

    <div class="score" id="aiscore">
      0
    </div>

  </section>

  <section class="stats">

    <div class="stat">
      <div class="label">Sessions</div>
      <div class="stat-value" id="sessions">0</div>
    </div>

    <div class="stat">
      <div class="label">Current Avg</div>
      <div class="stat-value" id="currentavg">0</div>
    </div>

    <div class="stat">
      <div class="label">Best Avg</div>
      <div class="stat-value" id="bestavg">0</div>
    </div>

    <div class="stat">
      <div class="label">Best Checkout</div>
      <div class="stat-value" id="checkout">0</div>
    </div>

    <div class="stat">
      <div class="label">Checkout %</div>
      <div class="stat-value" id="checkoutpct">0%</div>
    </div>

  </section>

  <section class="info">

    <div class="info-title">
      🎯 MAIN GOAL
    </div>

    <div class="info-text" id="goal">
      No goal set.
    </div>

  </section>

  <section class="info">

    <div class="info-title">
      ⚠️ MAIN ISSUE
    </div>

    <div class="info-text" id="weakness">
      No issue detected.
    </div>

  </section>

  <div class="footer">
    POWERED BY DARTIQ AI
  </div>

</main>

<script>
(function(){

  const params = new URLSearchParams(
    window.location.search
  );

  function getValue(key, fallback){

    const value = params.get(key);

    if(
      value === null ||
      value.trim() === ""
    ){
      return fallback;
    }

    try{

      return decodeURIComponent(
        value.replace(/\+/g," ")
      ).trim() || fallback;

    }catch(error){

      return value.trim() || fallback;

    }
  }

  const fields = {

    name:
      "Player",

    email:
      "player@email.com",

    aiscore:
      "0",

    sessions:
      "0",

    currentavg:
      "0",

    bestavg:
      "0",

    checkout:
      "0",

    checkoutpct:
      "0%",

    goal:
      "No goal set.",

    weakness:
      "No issue detected."
  };

  Object.keys(fields).forEach(function(id){

    const element =
      document.getElementById(id);

    if(element){

      element.textContent =
        getValue(id,fields[id]);

    }

  });

  const checkout =
    document.getElementById(
      "checkoutpct"
    );

  if(
    checkout &&
    checkout.textContent !== "--"
  ){

    checkout.textContent =
      checkout.textContent
      .replace(/%$/,"") + "%";

  }

  const photo =
    getValue("photo","");

  if(photo){

    document.getElementById(
      "photo"
    ).src = photo;

  }

})();
</script>

</body>
</html>
