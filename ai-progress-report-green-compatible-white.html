<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARTIQ AI Progress Report</title>
<style>
:root{
--bg:#020713;--panel:#141414;--panel2:#1d1d1d;
--glow:#fff;--text:#fff;--muted:#d7d7d7;--line:rgba(255,255,255,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,#071327,#020713);font-family:Arial,sans-serif;color:#fff;padding:10px}
.wrap{max-width:900px;margin:auto;border:1px solid var(--line);border-radius:28px;padding:18px;
background:linear-gradient(180deg,#181818,#080808);
box-shadow:0 0 28px rgba(255,255,255,.18),inset 0 0 20px rgba(255,255,255,.05)}
h1{font-size:44px;text-shadow:0 0 16px rgba(255,255,255,.7)}
.k{font-size:11px;letter-spacing:2px;color:#fff;font-weight:900}
.line{height:3px;background:linear-gradient(90deg,#fff,transparent);margin:16px 0;box-shadow:0 0 12px rgba(255,255,255,.4)}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:linear-gradient(180deg,#202020,#111);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 0 14px rgba(255,255,255,.08)}
.label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:900}
.score{font-size:72px;font-weight:900;text-shadow:0 0 18px rgba(255,255,255,.8)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:12px}
.stat{text-align:center}
.value{font-size:28px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,255,.5)}
.grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}
.title{font-weight:900;margin-bottom:8px}
.text{line-height:1.45;color:#f2f2f2}
.footer{text-align:center;margin-top:16px;font-size:10px;letter-spacing:2px;color:#ddd}
@media(max-width:700px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
<div class="k">DARTIQ AI • SESSION PROGRESS</div>
<h1>AI Progress Report</h1>
<div class="line"></div>

<div class="hero">
<div class="card"><div class="label">AI Coach Score</div><div class="score" id="score">--</div></div>
<div class="card"><div class="label">Report Summary</div><div class="text" id="summary">No summary.</div></div>
</div>

<div class="stats">
<div class="card stat"><div class="label">Average</div><div class="value" id="average">--</div></div>
<div class="card stat"><div class="label">First 9</div><div class="value" id="first9">--</div></div>
<div class="card stat"><div class="label">Checkout %</div><div class="value" id="checkoutpct">--</div></div>
<div class="card stat"><div class="label">180s</div><div class="value" id="total180">--</div></div>
<div class="card stat"><div class="label">140+</div><div class="value" id="total140">--</div></div>
</div>

<div class="grid">
<div class="card"><div class="title">🤖 AI Observation</div><div class="text" id="observation">No observation.</div></div>
<div class="card"><div class="title">💡 Coach Advice</div><div class="text" id="advice">No advice.</div></div>
<div class="card"><div class="title">📈 Conclusion</div><div class="text" id="conclusion">No conclusion.</div></div>
</div>

<div class="footer">POWERED BY DARTIQ AI</div>
</div>

<script>
const p=new URLSearchParams(location.search);
function g(k,d){const v=p.get(k);return v&&v.trim()?decodeURIComponent(v.replace(/\+/g," ")):d;}
["score","average","first9","checkoutpct","total180","total140","summary","observation","advice","conclusion"].forEach(id=>{
const e=document.getElementById(id);
if(e)e.textContent=g(id,e.textContent);
});
const cp=document.getElementById("checkoutpct");
if(cp.textContent!="--")cp.textContent=cp.textContent.replace(/%$/,"")+"%";
</script>
</body>
</html>
