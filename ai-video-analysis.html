<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DARTIQ AI Video Analysis</title>
<style>
body{margin:0;background:#06111d;font-family:Arial,sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{width:420px;max-width:95%;background:#0f1c2f;border:1px solid #1ea7ff;border-radius:22px;padding:24px;box-shadow:0 0 30px rgba(0,170,255,.35)}
h1{text-align:center;color:#66cfff}
p{text-align:center;color:#c8d8e8}
input,button{width:100%;padding:14px;margin-top:16px;border-radius:12px;border:none}
button{background:#11a8ff;color:#fff;font-weight:bold;cursor:pointer}
#status{margin-top:18px;text-align:center;font-weight:bold}
</style>
</head>
<body>
<div class="card">
<h1>DARTIQ AI Video Analysis</h1>
<p>Select your throw video</p>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://usglrseckxwcdykrwuvh.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_mSQ3imYCnUspBJdpl6ybQA__TdZtZ2a";
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const videoInput=document.getElementById("videoInput");
const analyzeBtn=document.getElementById("analyzeBtn");
const status=document.getElementById("status");

analyzeBtn.onclick=uploadVideo;

async function uploadVideo(){

const file=videoInput.files[0];

if(!file){
status.innerText="Select a video.";
return;
}

status.innerText="Uploading...";

const filename=Date.now()+"_"+file.name;

const upload=await client.storage
.from("Throw videos")
.upload(filename,file);

if(upload.error){
    alert(upload.error.message);
    console.error(upload.error);
    status.innerText = upload.error.message;
    return;
}

const publicUrl=client.storage
.from("Throw videos")
.getPublicUrl(filename).data.publicUrl;

const insert=await client
.from("video_analysis")
.insert([{
video_url:publicUrl,
status:"Uploaded"
}]);

if(insert.error){
console.error(insert.error);
status.innerText="Database failed.";
return;
}

status.innerText="Upload successful!";
}
</script>
</body>
</html>
