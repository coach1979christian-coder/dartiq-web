<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DARTIQ AI Video Analysis</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#06111d;
    font-family:Arial,sans-serif;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:20px 0;
}

.card{
    width:420px;
    max-width:95%;
    background:#0f1c2f;
    border:1px solid #1ea7ff;
    border-radius:22px;
    padding:24px;
    box-shadow:0 0 30px rgba(0,170,255,.35);
}

h1{
    margin-top:0;
    text-align:center;
    color:#66cfff;
}

p{
    text-align:center;
    color:#c8d8e8;
}

input,
button{
    width:100%;
    padding:14px;
    margin-top:16px;
    border-radius:12px;
    border:none;
}

button{
    background:#11a8ff;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:disabled{
    opacity:.5;
    cursor:not-allowed;
}

video{
    display:none;
    width:100%;
    max-height:320px;
    margin-top:18px;
    border-radius:14px;
    background:#000;
}

#status{
    margin-top:18px;
    text-align:center;
    font-weight:bold;
    line-height:1.5;
}

#results{
    display:none;
    margin-top:18px;
    padding:16px;
    background:#091525;
    border:1px solid rgba(102,207,255,.45);
    border-radius:14px;
}

.result-row{
    display:flex;
    justify-content:space-between;
    gap:16px;
    padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,.1);
}

.result-row:last-child{
    border-bottom:none;
}

.result-label{
    color:#a9bdd0;
}

.result-value{
    color:#66cfff;
    font-weight:bold;
    text-align:right;
}
</style>
</head>

<body>

<div class="card">

    <h1>DARTIQ AI Video Analysis</h1>

    <p>Select your throw video</p>

    <input
        id="videoInput"
        type="file"
        accept="video/*"
    >

    <video
        id="videoPreview"
        controls
        playsinline
        muted
    ></video>

    <button id="analyzeBtn">
        Analyze My Throw
    </button>

    <div id="status">
        Loading analysis engine...
    </div>

    <div id="results">

        <div class="result-row">
            <span class="result-label">Frames checked</span>
            <span class="result-value" id="framesChecked">0</span>
        </div>

        <div class="result-row">
            <span class="result-label">Pose detected</span>
            <span class="result-value" id="poseFrames">0</span>
        </div>

        <div class="result-row">
            <span class="result-label">Detection quality</span>
            <span class="result-value" id="detectionQuality">Waiting</span>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">

import {
    FilesetResolver,
    PoseLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/+esm";


const SUPABASE_URL =
    "https://usglrseckxwcdykrwuvh.supabase.co";

const SUPABASE_ANON_KEY =
    "sb_publishable_mSQ3imYCnUspBJdpl6ybQA__TdZtZ2a";


const supabaseClient =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );


const videoInput =
    document.getElementById("videoInput");

const videoPreview =
    document.getElementById("videoPreview");

const analyzeBtn =
    document.getElementById("analyzeBtn");

const statusElement =
    document.getElementById("status");

const resultsElement =
    document.getElementById("results");

const framesCheckedElement =
    document.getElementById("framesChecked");

const poseFramesElement =
    document.getElementById("poseFrames");

const detectionQualityElement =
    document.getElementById("detectionQuality");


let poseLandmarker = null;
let selectedVideoUrl = null;


analyzeBtn.disabled = true;


/* ---------------------------------------
   LOAD MEDIAPIPE
--------------------------------------- */

async function loadPoseLandmarker(){

    try{

        statusElement.innerText =
            "Loading analysis engine...";

        const vision =
            await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
            );

        poseLandmarker =
            await PoseLandmarker.createFromOptions(
                vision,
                {
                    baseOptions:{
                        modelAssetPath:
                            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
                        delegate:"CPU"
                    },

                    runningMode:"VIDEO",

                    numPoses:1,

                    minPoseDetectionConfidence:0.5,

                    minPosePresenceConfidence:0.5,

                    minTrackingConfidence:0.5
                }
            );

        analyzeBtn.disabled = false;

        statusElement.innerText =
            "Ready. Select a throw video.";

    }catch(error){

        console.error(error);

        statusElement.innerText =
            "Analysis engine failed to load.";

    }

}


/* ---------------------------------------
   VIDEO SELECTION
--------------------------------------- */

videoInput.addEventListener(
    "change",
    function(){

        const file =
            videoInput.files[0];

        if(!file){
            return;
        }

        if(selectedVideoUrl){
            URL.revokeObjectURL(
                selectedVideoUrl
            );
        }

        selectedVideoUrl =
            URL.createObjectURL(file);

        videoPreview.src =
            selectedVideoUrl;

        videoPreview.style.display =
            "block";

        resultsElement.style.display =
            "none";

        statusElement.innerText =
            "Video selected. Press Analyze My Throw.";

    }
);


/* ---------------------------------------
   ANALYZE BUTTON
--------------------------------------- */

analyzeBtn.addEventListener(
    "click",
    async function(){

        const file =
            videoInput.files[0];

        if(!file){

            statusElement.innerText =
                "Select a video first.";

            return;
        }

        if(!poseLandmarker){

            statusElement.innerText =
                "Analysis engine is not ready.";

            return;
        }

        analyzeBtn.disabled = true;

        try{

            const analysisResult =
                await analyzeVideo();

            await uploadVideo(
                file,
                analysisResult
            );

        }catch(error){

            console.error(error);

            statusElement.innerText =
                "Analysis failed: " +
                error.message;

        }finally{

            analyzeBtn.disabled = false;

        }

    }
);


/* ---------------------------------------
   LOCAL VIDEO ANALYSIS
--------------------------------------- */

async function analyzeVideo(){

    statusElement.innerText = "Analyzing video...";

    await waitForVideoMetadata();

    videoPreview.currentTime = 0;

    await new Promise(resolve=>{
        videoPreview.onseeked = ()=>resolve();
    });

    const result = poseLandmarker.detectForVideo(
        videoPreview,
        performance.now()
    );
let techniqueScore = 0;
let headMovement = "Unknown";
let elbowStability = "Unknown";
let mainIssue = "Unknown";

if (result.landmarks && result.landmarks.length > 0) {

    const p = result.landmarks[0];

    const nose = p[0];
    const leftShoulder = p[11];
    const rightShoulder = p[12];
    const leftElbow = p[13];
    const rightElbow = p[14];

    const shoulderLevel =
        Math.abs(leftShoulder.y - rightShoulder.y);

    const elbowLevel =
        Math.abs(leftElbow.y - rightElbow.y);

    techniqueScore = 100;

    if (shoulderLevel > 0.05) techniqueScore -= 10;
    if (elbowLevel > 0.07) techniqueScore -= 15;

    headMovement =
        shoulderLevel < 0.05 ? "Low" : "High";

    elbowStability =
        elbowLevel < 0.07 ? "Good" : "Poor";

    if (elbowLevel > 0.07)
        mainIssue = "Elbow Instability";
    else
        mainIssue = "Good Technique";
}
    const framesChecked = 1;

    const framesWithPose =
        (result.landmarks && result.landmarks.length > 0)
        ? 1
        : 0;

    const detectionPercentage =
        framesWithPose * 100;

    const quality =
        framesWithPose
        ? "Good"
        : "No pose detected";

    framesCheckedElement.innerText = framesChecked;
    poseFramesElement.innerText = framesWithPose;
    detectionQualityElement.innerText = quality;

    resultsElement.style.display = "block";

    return{
    framesChecked,
    framesWithPose,
    detectionPercentage,
    quality,
    techniqueScore,
    mainIssue
};

}


/* ---------------------------------------
   VIDEO HELPERS
--------------------------------------- */

function waitForVideoMetadata(){

    return new Promise(
        (resolve,reject)=>{

            if(
                videoPreview.readyState >= 1 &&
                Number.isFinite(
                    videoPreview.duration
                )
            ){
                resolve();
                return;
            }

            const timeout =
                setTimeout(
                    ()=>{
                        reject(
                            new Error(
                                "Video loading timed out."
                            )
                        );
                    },
                    15000
                );

            videoPreview.addEventListener(
                "loadedmetadata",
                ()=>{
                    clearTimeout(timeout);
                    resolve();
                },
                {once:true}
            );

            videoPreview.load();

        }
    );

}


function seekVideo(time){

    return new Promise(
        (resolve,reject)=>{

            const timeout =
                setTimeout(
                    ()=>{
                        reject(
                            new Error(
                                "Could not read a video frame."
                            )
                        );
                    },
                    10000
                );

            videoPreview.addEventListener(
                "seeked",
                ()=>{
                    clearTimeout(timeout);
                    resolve();
                },
                {once:true}
            );

            videoPreview.currentTime =
                Math.min(
                    time,
                    Math.max(
                        0,
                        videoPreview.duration - 0.01
                    )
                );

        }
    );

}


/* ---------------------------------------
   SUPABASE UPLOAD
--------------------------------------- */

async function uploadVideo(
    file,
    analysisResult
){

    statusElement.innerText =
        "Analysis complete. Uploading video...";

    const safeName =
        file.name.replace(
            /[^a-zA-Z0-9._-]/g,
            "_"
        );

    const filename =
        Date.now() +
        "_" +
        safeName;

    const {
        data:uploadData,
        error:uploadError
    } =
        await supabaseClient.storage
        .from("Throw videos")
        .upload(
            filename,
            file,
            {
                cacheControl:"3600",
                upsert:false
            }
        );

    if(uploadError){
        throw uploadError;
    }

    const {
        data:publicUrlData
    } =
        supabaseClient.storage
        .from("Throw videos")
        .getPublicUrl(
            uploadData.path
        );

    const publicUrl =
        publicUrlData.publicUrl;

    const {
        error:insertError
    } =
        await supabaseClient
        .from("video_analysis")
        .insert([
            {
               video_url: publicUrl,
status:"Pose detected",

technique_score: analysisResult.techniqueScore,
main_issue: analysisResult.mainIssue,

frames_checked:
    analysisResult.framesChecked,
pose_frames:
    analysisResult.framesWithPose,
detection_percentage:
    analysisResult.detectionPercentage,
detection_quality:
    analysisResult.quality
            }
        ]);

    if(insertError){
        throw insertError;
    }

    statusElement.innerText =
        "Analysis and upload successful!";

}


/* ---------------------------------------
   START
--------------------------------------- */

loadPoseLandmarker();

</script>

</body>
</html>
