<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTIQ AI Video Analysis</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#06111d;
  font-family:Arial,sans-serif;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:20px 0
}
.card{
  width:420px;
  max-width:95%;
  background:#0f1c2f;
  border:1px solid #1ea7ff;
  border-radius:22px;
  padding:24px;
  box-shadow:0 0 30px rgba(0,170,255,.35)
}
h1{
  margin:0 0 8px;
  text-align:center;
  color:#66cfff;
  font-size:28px
}
.subtitle{
  text-align:center;
  color:#c8d5e6;
  margin-bottom:22px
}
input[type=file]{
  width:100%;
  padding:12px;
  background:#091523;
  color:#fff;
  border:1px solid #2d4c68;
  border-radius:12px;
  margin-bottom:18px
}
video{
  display:none;
  width:100%;
  max-height:440px;
  background:#000;
  border-radius:16px;
  margin-bottom:18px
}
button{
  width:100%;
  border:0;
  border-radius:14px;
  padding:16px;
  font-size:19px;
  font-weight:700;
  color:#fff;
  background:#1478b8;
  cursor:pointer
}
button:disabled{
  opacity:.45;
  cursor:not-allowed
}
.status{
  min-height:24px;
  margin:18px 0 0;
  text-align:center;
  font-size:16px;
  font-weight:700
}
.error{color:#ff8383}
.success{color:#7ee7ff}
.results{
  display:none;
  margin-top:20px;
  padding:16px;
  border:1px solid #2c658c;
  border-radius:16px;
  background:#0a1727
}
.result-row{
  display:flex;
  justify-content:space-between;
  gap:14px;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.12)
}
.result-row:last-child{border-bottom:0}
.result-label{color:#b7c6d8}
.result-value{
  color:#5bcaff;
  font-weight:700;
  text-align:right
}
.hidden-canvas{display:none}
</style>
</head>
<body>
<div class="card">
  <h1>DARTIQ AI Video Analysis</h1>
  <div class="subtitle">Select your throw video</div>

  <input id="videoInput" type="file" accept="video/*">
  <video id="videoPreview" controls playsinline preload="metadata"></video>

  <button id="analyzeBtn" disabled>Analyze My Throw</button>
  <div id="status" class="status">Loading analysis engine...</div>

  <div id="results" class="results">
    <div class="result-row">
      <span class="result-label">Frames checked</span>
      <span class="result-value" id="framesChecked">0</span>
    </div>
    <div class="result-row">
      <span class="result-label">Pose detected</span>
      <span class="result-value" id="poseFrames">0</span>
    </div>
    <div class="result-row">
      <span class="result-label">Detection quality</span>
      <span class="result-value" id="detectionQuality">Waiting</span>
    </div>
  </div>

  <canvas id="analysisCanvas" class="hidden-canvas"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script type="module">
import {
  FilesetResolver,
  PoseLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/+esm";

const SUPABASE_URL = "https://usglrseckxwcdykrwuvh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_mSQ3imYCnUspBJdpl6ybQA__TdZtZ2a";
const STORAGE_BUCKET = "Throw videos";
const TABLE_NAME = "video_analysis";

const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const params = new URLSearchParams(window.location.search);

const rawPlayerEmail = (
  params.get("email") ||
  params.get("Email") ||
  params.get("player_email") ||
  params.get("Player_Email") ||
  ""
).trim();

const invalidEmailPlaceholders = new Set([
  "",
  "USER_EMAIL",
  "EMAIL",
  "SIGNED_IN_USER_EMAIL",
  "null",
  "undefined"
]);

const playerEmail = invalidEmailPlaceholders.has(rawPlayerEmail)
  ? "coach1979christian@gmail.com"
  : rawPlayerEmail;

const videoInput = document.getElementById("videoInput");
const videoPreview = document.getElementById("videoPreview");
const analyzeBtn = document.getElementById("analyzeBtn");
const statusElement = document.getElementById("status");
const resultsElement = document.getElementById("results");
const framesCheckedElement = document.getElementById("framesChecked");
const poseFramesElement = document.getElementById("poseFrames");
const detectionQualityElement = document.getElementById("detectionQuality");
const canvas = document.getElementById("analysisCanvas");
const ctx = canvas.getContext("2d", { willReadFrequently:true });

let poseLandmarker = null;
let selectedFile = null;
let selectedVideoUrl = null;

function setStatus(message, type=""){
  statusElement.textContent = message;
  statusElement.className = "status";
  if(type) statusElement.classList.add(type);
}

function cleanObjectUrl(){
  if(selectedVideoUrl){
    URL.revokeObjectURL(selectedVideoUrl);
    selectedVideoUrl = null;
  }
}

async function loadPoseLandmarker(){
  try{
    setStatus("Loading analysis engine...");
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
    );

    poseLandmarker = await PoseLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO",
      numPoses:1,
      minPoseDetectionConfidence:0.45,
      minPosePresenceConfidence:0.45,
      minTrackingConfidence:0.45
    });

    setStatus("Analysis engine ready.","success");
    if(selectedFile) analyzeBtn.disabled = false;
  }catch(firstError){
    try{
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
      );

      poseLandmarker = await PoseLandmarker.createFromOptions(vision,{
        baseOptions:{
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task"
        },
        runningMode:"VIDEO",
        numPoses:1,
        minPoseDetectionConfidence:0.4,
        minPosePresenceConfidence:0.4,
        minTrackingConfidence:0.4
      });

      setStatus("Analysis engine ready.","success");
      if(selectedFile) analyzeBtn.disabled = false;
    }catch(error){
      console.error(error);
      setStatus("Could not load the analysis engine.","error");
    }
  }
}

videoInput.addEventListener("change",()=>{
  cleanObjectUrl();
  selectedFile = videoInput.files?.[0] || null;
  resultsElement.style.display = "none";
  framesCheckedElement.textContent = "0";
  poseFramesElement.textContent = "0";
  detectionQualityElement.textContent = "Waiting";

  if(!selectedFile){
    videoPreview.removeAttribute("src");
    videoPreview.style.display = "none";
    analyzeBtn.disabled = true;
    return;
  }

  if(!selectedFile.type.startsWith("video/")){
    selectedFile = null;
    videoInput.value = "";
    videoPreview.style.display = "none";
    analyzeBtn.disabled = true;
    setStatus("Please select a valid video file.","error");
    return;
  }

  selectedVideoUrl = URL.createObjectURL(selectedFile);
  videoPreview.src = selectedVideoUrl;
  videoPreview.style.display = "block";
  videoPreview.load();

  analyzeBtn.disabled = !poseLandmarker;
  setStatus(
    poseLandmarker ? "Video ready for analysis." : "Loading analysis engine..."
  );
});

function waitForMetadata(){
  return new Promise((resolve,reject)=>{
    if(
      videoPreview.readyState >= 1 &&
      Number.isFinite(videoPreview.duration) &&
      videoPreview.duration > 0
    ){
      resolve();
      return;
    }

    const timeout = setTimeout(()=>{
      reject(new Error("Video loading timed out."));
    },20000);

    videoPreview.addEventListener("loadedmetadata",()=>{
      clearTimeout(timeout);
      resolve();
    },{once:true});

    videoPreview.load();
  });
}

function seekVideo(time){
  return new Promise((resolve,reject)=>{
    const timeout = setTimeout(()=>{
      reject(new Error("Could not read a video frame."));
    },12000);

    const done = ()=>{
      clearTimeout(timeout);
      resolve();
    };

    videoPreview.addEventListener("seeked",done,{once:true});
    videoPreview.currentTime = Math.min(
      Math.max(0,time),
      Math.max(0,videoPreview.duration - 0.02)
    );
  });
}

function averageVisibility(landmarks){
  if(!Array.isArray(landmarks) || landmarks.length === 0) return 0;
  const values = landmarks
    .map(p=>Number.isFinite(p.visibility) ? p.visibility : 0)
    .filter(Number.isFinite);
  if(values.length === 0) return 0;
  return values.reduce((a,b)=>a+b,0) / values.length;
}

function clamp(value,min=0,max=100){
  return Math.max(min,Math.min(max,value));
}

function distance2D(a,b){
  return Math.hypot((a?.x||0)-(b?.x||0),(a?.y||0)-(b?.y||0));
}

function angle3(a,b,c){
  if(!a||!b||!c) return 0;
  const ab={x:a.x-b.x,y:a.y-b.y};
  const cb={x:c.x-b.x,y:c.y-b.y};
  const d=Math.hypot(ab.x,ab.y)*Math.hypot(cb.x,cb.y);
  if(!d) return 0;
  const cos=clamp((ab.x*cb.x+ab.y*cb.y)/d,-1,1);
  return Math.acos(cos)*180/Math.PI;
}

function mean(values){
  const clean=values.filter(Number.isFinite);
  return clean.length ? clean.reduce((a,b)=>a+b,0)/clean.length : 0;
}

function deviation(values){
  const m=mean(values);
  return Math.sqrt(mean(values.map(v=>(v-m)**2)));
}

function movementScore(points,normalizer,multiplier){
  if(points.length<2) return 0;
  const xs=points.map(p=>p.x);
  const ys=points.map(p=>p.y);
  const move=Math.hypot(Math.max(...xs)-Math.min(...xs),Math.max(...ys)-Math.min(...ys));
  return clamp(Math.round(100-(move/Math.max(normalizer,.03))*multiplier));
}

function coachingFor(issue){
  const data={
    "Head Movement":["Keep your head fixed from setup through release.","Head stability.","Still Head Drill"],
    "Body Movement":["Keep the torso stable and let the forearm perform the throw.","Stable upper body.","Wall Stability Drill"],
    "Poor Follow Through":["Extend naturally toward the target and hold the finish.","Complete follow-through.","Follow-Through Hold Drill"],
    "Elbow Instability":["Keep the elbow controlled during acceleration.","Elbow stability.","Elbow Anchor Drill"],
    "Early Release":["Let the forearm travel slightly farther before release.","Later release timing.","Release Timing Drill"],
    "Late Release":["Release slightly earlier before the hand drops below the target line.","Earlier release timing.","Release Timing Drill"],
    "Inconsistent Release":["Repeat the same rhythm and release point.","Release consistency.","Release Rhythm Drill"],
    "Good Technique":["Maintain this motion and repeat it under pressure.","Consistency under pressure.","Pressure Repetition Drill"],
    "No pose detected":["Record the full throwing side with head, elbow, wrist and hips visible.","Camera position.","Recording Setup Check"]
  };
  const row=data[issue]||data["Inconsistent Release"];
  return{coachAdvice:row[0],practiceFocus:row[1],recommendedDrill:row[2]};
}

function calculateMotionMetrics(keypoints){
  if(!keypoints.length){
    return{
      techniqueScore:0,mainIssue:"No pose detected",releaseFrame:0,
      releaseTiming:"Unknown",elbowAngle:0,wristAngle:0,shoulderAngle:0,
      armExtension:0,throwConsistency:0,followThroughScore:0,
      headMovementScore:0,bodyStabilityScore:0,...coachingFor("No pose detected")
    };
  }

  const leftMove=keypoints.slice(1).reduce((s,f,i)=>s+distance2D(
    keypoints[i].landmarks[15],f.landmarks[15]),0);
  const rightMove=keypoints.slice(1).reduce((s,f,i)=>s+distance2D(
    keypoints[i].landmarks[16],f.landmarks[16]),0);
  const left=leftMove>rightMove;
  const shoulder=left?11:12, elbow=left?13:14, wrist=left?15:16;
  const finger=left?19:20, hip=left?23:24;

  const elbows=[],wrists=[],shoulders=[],wristPoints=[],heads=[],bodies=[],widths=[];
  for(const frame of keypoints){
    const l=frame.landmarks;
    elbows.push(angle3(l[shoulder],l[elbow],l[wrist]));
    wrists.push(angle3(l[elbow],l[wrist],l[finger]));
    shoulders.push(angle3(l[hip],l[shoulder],l[elbow]));
    wristPoints.push(l[wrist]);
    heads.push(l[0]);
    bodies.push({x:(l[11].x+l[12].x+l[23].x+l[24].x)/4,
                 y:(l[11].y+l[12].y+l[23].y+l[24].y)/4});
    widths.push(distance2D(l[11],l[12]));
  }

  const speeds=[0];
  for(let i=1;i<wristPoints.length;i++){
    const dt=Math.max(.001,keypoints[i].time_seconds-keypoints[i-1].time_seconds);
    speeds.push(distance2D(wristPoints[i-1],wristPoints[i])/dt);
  }
  let releaseIndex=0;
  for(let i=1;i<speeds.length;i++) if(speeds[i]>speeds[releaseIndex]) releaseIndex=i;

  const ratio=keypoints.length>1?releaseIndex/(keypoints.length-1):.5;
  const releaseTiming=ratio<.35?"Early":ratio>.72?"Late":"Controlled";
  const normalizer=Math.max(.03,mean(widths));
  const headMovementScore=movementScore(heads,normalizer,260);
  const bodyStabilityScore=movementScore(bodies,normalizer,300);
  const elbowStability=clamp(Math.round(100-deviation(elbows)*4));
  const releaseElbow=Math.round(elbows[releaseIndex]||mean(elbows));
  const armExtension=Math.round(Math.max(...elbows));
  const followDistance=distance2D(wristPoints[releaseIndex],wristPoints[wristPoints.length-1])/normalizer;
  const followThroughScore=clamp(Math.round(40+Math.min(60,followDistance*120)));
  const throwConsistency=clamp(Math.round((elbowStability+headMovementScore+bodyStabilityScore)/3));
  const techniqueScore=clamp(Math.round(
    headMovementScore*.2+bodyStabilityScore*.2+followThroughScore*.25+
    elbowStability*.2+throwConsistency*.15
  ));

  let mainIssue="Good Technique";
  const issues=[
    ["Head Movement",headMovementScore],
    ["Body Movement",bodyStabilityScore],
    ["Poor Follow Through",followThroughScore],
    ["Elbow Instability",elbowStability],
    ["Inconsistent Release",throwConsistency]
  ].sort((a,b)=>a[1]-b[1]);
  if(issues[0][1]<70) mainIssue=issues[0][0];
  else if(releaseTiming==="Early") mainIssue="Early Release";
  else if(releaseTiming==="Late") mainIssue="Late Release";

  return{
    techniqueScore,mainIssue,
    releaseFrame:keypoints[releaseIndex]?.frame||releaseIndex+1,
    releaseTiming,
    elbowAngle:releaseElbow,
    wristAngle:Math.round(wrists[releaseIndex]||mean(wrists)),
    shoulderAngle:Math.round(shoulders[releaseIndex]||mean(shoulders)),
    armExtension,throwConsistency,followThroughScore,
    headMovementScore,bodyStabilityScore,
    ...coachingFor(mainIssue)
  };
}

async function analyzeVideo(){
  await waitForMetadata();

  const duration=Number(videoPreview.duration);
  if(!Number.isFinite(duration)||duration<=0) throw new Error("The selected video could not be loaded.");

  canvas.width=Math.max(1,videoPreview.videoWidth);
  canvas.height=Math.max(1,videoPreview.videoHeight);

  let framesChecked=0,framesWithPose=0,running=true,lastAnalyzedTime=-1;
  const keypoints=[];
  const sampleInterval=.45,maxFrames=24;

  videoPreview.pause();
  videoPreview.currentTime=0;
  videoPreview.muted=true;
  videoPreview.playsInline=true;
  videoPreview.playbackRate=1;

  await new Promise((resolve,reject)=>{
    const timeout=setTimeout(()=>{running=false;reject(new Error("Video analysis timed out."));},
      Math.max(30000,duration*4000));

    const finish=()=>{
      if(!running)return;
      running=false;clearTimeout(timeout);videoPreview.pause();resolve();
    };
    const fail=()=>{
      if(!running)return;
      running=false;clearTimeout(timeout);reject(new Error("Could not read the video during playback."));
    };
    const frame=()=>{
      if(!running)return;
      const currentTime=Number(videoPreview.currentTime||0);
      if(currentTime-lastAnalyzedTime>=sampleInterval&&framesChecked<maxFrames&&videoPreview.readyState>=2){
        try{
          ctx.drawImage(videoPreview,0,0,canvas.width,canvas.height);
          const result=poseLandmarker.detectForVideo(canvas,Math.max(1,Math.round(currentTime*1000)));
          framesChecked++;lastAnalyzedTime=currentTime;
          if(result.landmarks?.length){
            framesWithPose++;
            keypoints.push({
              frame:framesChecked,
              time_seconds:Number(currentTime.toFixed(3)),
              landmarks:result.landmarks[0].map((p,index)=>({
                index,x:Number(p.x.toFixed(6)),y:Number(p.y.toFixed(6)),
                z:Number(p.z.toFixed(6)),visibility:Number((p.visibility??0).toFixed(6))
              }))
            });
          }
          framesCheckedElement.textContent=String(framesChecked);
          poseFramesElement.textContent=String(framesWithPose);
          resultsElement.style.display="block";
          setStatus(`Analyzing frame ${framesChecked}...`);
        }catch(error){console.warn("Frame skipped:",error);}
      }
      if(videoPreview.ended||currentTime>=duration-.08||framesChecked>=maxFrames){finish();return;}
      if(typeof videoPreview.requestVideoFrameCallback==="function"){
        videoPreview.requestVideoFrameCallback(frame);
      }else requestAnimationFrame(frame);
    };
    videoPreview.addEventListener("ended",finish,{once:true});
    videoPreview.addEventListener("error",fail,{once:true});
    videoPreview.play().then(()=>{
      if(typeof videoPreview.requestVideoFrameCallback==="function"){
        videoPreview.requestVideoFrameCallback(frame);
      }else requestAnimationFrame(frame);
    }).catch(fail);
  });

  const detectionPercentage=framesChecked?Math.round(framesWithPose/framesChecked*100):0;
  let quality="No pose detected";
  if(detectionPercentage>=80)quality="Excellent";
  else if(detectionPercentage>=60)quality="Good";
  else if(detectionPercentage>=30)quality="Limited";

  const metrics=calculateMotionMetrics(keypoints);
  framesCheckedElement.textContent=String(framesChecked);
  poseFramesElement.textContent=String(framesWithPose);
  detectionQualityElement.textContent=quality;
  resultsElement.style.display="block";

  return{framesChecked,framesWithPose,detectionPercentage,quality,keypoints,...metrics};
}

async function uploadVideo(file,analysisResult){
  setStatus("Analysis complete. Uploading video...");

  const safeName=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
  const emailFolder=playerEmail.replace(/[^a-zA-Z0-9@._-]/g,"_");
  const filename=`${emailFolder}/${Date.now()}_${safeName}`;

  const {error:uploadError}=await supabaseClient.storage
    .from(STORAGE_BUCKET).upload(filename,file,{
      cacheControl:"3600",upsert:false,contentType:file.type||"video/mp4"
    });
  if(uploadError)throw uploadError;

  const {data:publicUrlData}=supabaseClient.storage.from(STORAGE_BUCKET).getPublicUrl(filename);
  const videoUrl=publicUrlData?.publicUrl;
  if(!videoUrl)throw new Error("Could not create video URL.");

  const {data:inserted,error:insertError}=await supabaseClient
    .from(TABLE_NAME)
    .insert({
      Player_Email:playerEmail,
      video_url:videoUrl,
      status:"Analyzing",
      analysis_complete:false
    })
    .select("id")
    .single();

  if(insertError)throw insertError;
  if(!inserted?.id)throw new Error("No database row ID returned.");

  const updateRow={
    technique_score:analysisResult.techniqueScore,
    main_issue:analysisResult.mainIssue,
    coach_advice:analysisResult.coachAdvice,
    recommended_drill:analysisResult.recommendedDrill,
    practice_focus:analysisResult.practiceFocus,
    ai_summary:`${analysisResult.mainIssue}. Technique score ${analysisResult.techniqueScore}/100.`,
    confidence_score:analysisResult.detectionPercentage,
    frames_checked:analysisResult.framesChecked,
    pose_detected:analysisResult.framesWithPose,
    detection_percentage:analysisResult.detectionPercentage,
    release_frame:analysisResult.releaseFrame,
    release_timing:analysisResult.releaseTiming,
    elbow_angle:analysisResult.elbowAngle,
    wrist_angle:analysisResult.wristAngle,
    shoulder_angle:analysisResult.shoulderAngle,
    arm_extension:analysisResult.armExtension,
    throw_consistency:analysisResult.throwConsistency,
    follow_through_score:analysisResult.followThroughScore,
    head_movement_score:analysisResult.headMovementScore,
    body_stability_score:analysisResult.bodyStabilityScore,
    analysis_complete:true,
    status:analysisResult.framesWithPose>0?"Analysis complete":"No pose detected"
  };

  const {error:updateError}=await supabaseClient
    .from(TABLE_NAME)
    .update(updateRow)
    .eq("id",inserted.id);

  if(updateError)throw updateError;
  return inserted.id;
}

analyzeBtn.addEventListener("click",async()=>{
  if(!selectedFile || !poseLandmarker) return;

  analyzeBtn.disabled = true;
  videoInput.disabled = true;

  try{
    if(!playerEmail){
      throw new Error(
        "Player email is missing. Add ?email=SIGNED_IN_USER_EMAIL to the Glide web embed URL."
      );
    }

    const analysisResult = await analyzeVideo();
    await uploadVideo(selectedFile,analysisResult);

    setStatus("Analysis and upload complete.","success");
  }catch(error){
    console.error(error);
    setStatus(error?.message || "Analysis failed.","error");
  }finally{
    analyzeBtn.disabled = false;
    videoInput.disabled = false;
  }
});

window.addEventListener("beforeunload",cleanObjectUrl);

loadPoseLandmarker();
</script>
</body>
</html>
